name: Compatibility Dashboard

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    name: Build and deploy compatibility dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # TODO: Replace this placeholder with the real compat harness once it can
      # run headless in CI. The harness needs a browser context such as
      # agent-browser or a similar headless driver to execute the Node.js
      # vendored tests and package probes, then emit results/*.json.
      - name: Run compat harness
        run: |
          echo 'Compat harness placeholder: generate results/node-compat.json and results/package-matrix.json here.'
          echo 'Until then the dashboard falls back to sample-results/.'

      - name: Build dashboard
        run: |
          mkdir -p _site
          cp apps/compat-dashboard/index.html _site/
          cp apps/compat-dashboard/style.css _site/
          cp apps/compat-dashboard/app.js _site/
          # Copy real results if they exist, otherwise copy sample data so the
          # dashboard always renders.
          if [ -d apps/compat-dashboard/results ]; then
            cp -r apps/compat-dashboard/results _site/
          else
            cp -r apps/compat-dashboard/sample-results _site/results
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
