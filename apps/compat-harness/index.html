<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>bolo compat harness</title>
  <style>
    body { font-family: monospace; margin: 2rem; }
    button { padding: 0.5rem 1rem; margin: 1rem 0; cursor: pointer; }
    pre { background: #f4f4f4; padding: 1rem; overflow: auto; max-height: 400px; }
    .pass { color: green; } .fail { color: red; } .skip { color: orange; }

  <div id="results"></div>
  <div id="pkgResults"></div>
  <script type="module" src="/src/main.ts"></script>
